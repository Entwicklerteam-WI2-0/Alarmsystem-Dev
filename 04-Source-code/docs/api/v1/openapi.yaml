# =============================================================================
# Alarmsystem-Backend G2 — API v1 (Vereisungserkennung ANR)
# DTB-19 (P1.2) · OpenAPI 3.0.3
#
# Single Source of Truth: 04-Source-code/docs/API_FROZEN_v1.md (eingefrorener
# Contract, DTB-35/P1.4). Diese YAML ist die formale Abschrift davon — keine
# eigenen Entscheidungen. Feld-Quelle: src/model/schemas.py (Reading/Assessment).
# Begruendung: Entscheidungslog E-36 (Contract) + E-37 (Alarme = Push).
#
# Diese Datei beschreibt NUR die von G2 bereitgestellte API (G3 ist Client).
# Der von G2 KONSUMIERTE G1-Vertrag steht separat in g1-consumed.openapi.yaml
# (eigene API, eigener Server — gehoert nicht in diese Spec hinein).
#
# RB-01: Reine Entscheidungsunterstuetzung. Es gibt KEINEN Freigabe-/Sperr-/
#        Aktor-Endpoint — auch nicht "temporaer".
# NF-01 (Fail-safe): Bei Stale/G1-Ausfall NIE GRUEN. Kein Fehler, sondern
#        risk_level=unknown + is_stale=true (200). 503 nur bei echter
#        G2-Nichtverfuegbarkeit.
#
# Status: EINGEFROREN (v1.0, 2026-06-24) — G1- und G3-Lead haben bestaetigt
#        (DTB-26, seam-sync-confirmed). Git-Tag api-v1.0 ausstehend (Freigabe Lucas).
# OPERATIONSZAHL: Die urspruengliche DTB-19-DoD nannte ">= 15 Operationen". Diese
#        ist durch die verbindliche Architekten-Vorlage (Jira DTB-19, Kommentar
#        23.06., Lucas Voehringer/DRI) UEBERHOLT: massgeblich ist das Lean-Set von
#        ~6 G2- + 2 G1-Operationen, exakt gegen API_FROZEN_v1.md. Keine Endpoints
#        erfinden, nur um eine Zahl zu treffen (das waere Drift).
# =============================================================================

openapi: 3.0.3

info:
  title: Alarmsystem-Backend G2 — API v1 (Vereisungserkennung ANR)
  version: 1.0.0
  description: |
    REST-Schnittstelle des G2-Backends (Erfassung & Bewertung von
    Vereisungsbedingungen am Regionalflughafen ANR). **G2 ist hier Server**,
    **G3 (Frontend) ist Client** (GET / SSE-Abo — G3 hostet nichts).

    **Sicherheits-Randbedingung RB-01:** Das System ist reine
    *Entscheidungsunterstuetzung*. Es gibt **keinen** Endpoint, der die Startbahn
    freigibt/sperrt/steuert. Quittieren eines Alarms ist eine reine UI-/Audit-
    Aktion, kein Steuerbefehl.

    **Fail-safe NF-01:** Bei veralteten (stale) oder fehlenden Daten liefert die
    aktuelle Bewertung **nie GRUEN**, sondern `risk_level=unknown` +
    `is_stale=true` mit HTTP `200` — das ist **kein** Fehlerfall. `503` nur, wenn
    G2 selbst nicht lieferfaehig ist (z. B. noch keine Daten / interner Ausfall).

    Quelle: `docs/API_FROZEN_v1.md`. Konsumierter G1-Vertrag: siehe
    `g1-consumed.openapi.yaml`.

servers:
  - url: http://localhost:8000
    description: Lokale Entwicklung (Prototyp)

tags:
  - name: Health
    description: Verfuegbarkeit des G2-Backends.
  - name: Assessment
    description: Aktuelle Vereisungsbewertung (Ampel + Roh-Messwerte).
  - name: Readings
    description: Historie der eingegangenen Messwerte (Ausbaustufe T1).
  - name: Alarms
    description: Alarme — Live-Push via SSE, Zustands-Abfrage zum Resync, Quittierung.
  - name: Thresholds
    description: Parametrierbare Vereisungs-Schwellenwerte fuer das G3-Menue (DTB-62, NF-05).

paths:
  /v1/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Verfuegbarkeit von G2
      description: Liveness-Check des G2-Backends. `200` = erreichbar, `503` = (noch) nicht lieferfaehig.
      responses:
        "200":
          description: G2 ist erreichbar.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
              example:
                status: ok
        "503":
          description: G2 ist (noch) nicht lieferfaehig (z. B. Startup vor dem ersten Messwert / interner Ausfall).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: SERVICE_UNAVAILABLE
                message: "G2 noch nicht bereit."

  /v1/thresholds:
    get:
      tags: [Thresholds]
      operationId: getThresholds
      summary: Aktuelle Schwellenwerte lesen (DTB-62)
      description: |
        Liefert die aktuell konfigurierten Vereisungs-Schwellenwerte (aus
        `config/thresholds.json` via Loader DTB-15) fuer das G3-Schwellenwert-Menue.
        Werte sind parametrierbar (NF-05); aktuell DUMMY (G1-Finalwerte folgen).

        **RB-01-neutral:** rein lesend, kein Aktor. **Aendern** der Schwellen erfolgt
        spaeter ueber einen separaten, Auth-geschuetzten Endpoint (NF-07).

        > Nach dem v1.0-Freeze ergaenzt (DTB-62) — Naht-Review durch Architekt.
      responses:
        "200":
          description: Aktuelle Schwellenwerte.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thresholds"
              example:
                vereisung:
                  t_s_gefrierpunkt_c: 0.0
                  t_s_gelb_auffang_c: 1.0
                  delta_t_kondensation_k: 0.0
                  delta_t_feucht_k: 1.0
                prognose:
                  t_s_grenz_c: 0.0
                datenqualitaet:
                  stale_timeout_s: 120
                  max_temp_jump_c_per_min: 5.0
                  flatline_timeout_min: 15.0
                  flatline_epsilon_c: 0.15
                  max_clock_skew_s: 5.0
                  min_plausible_dew_point_c: -50.0
                plausibilitaet:
                  min_temp_c: -50.0
                  max_temp_c: 50.0
                  min_humidity_pct: 0.0
                  max_humidity_pct: 100.0
                  min_pressure_hpa: 800.0
                  max_pressure_hpa: 1100.0
        "503":
          description: >-
            G2 (noch) nicht lieferfaehig — Runtime nicht bereit (z. B. Schwellen-Config
            beim Start nicht ladbar). Generische Meldung, keine internen Details (Contract D).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: SERVICE_UNAVAILABLE
                message: "G2 momentan nicht lieferfaehig."
    put:
      tags: [Thresholds]
      operationId: updateThresholds
      summary: Schwellenwerte versioniert aktualisieren (Auth, DTB-63)
      security:
        - BearerApiKey: []
      description: |
        Legt einen neuen, **versionierten** Schwellensatz an (Supersession per
        neuem `valid_from`-Satz — append-only, kein Ueberschreiben; DTB-54) und
        schreibt in derselben Transaktion den `threshold_changed`-Audit-Eintrag
        (NF-09).

        **Auth (NF-07):** Erfordert `Authorization: Bearer <key>`. Fehlender/
        falscher Schluessel -> `401`; ist serverseitig kein Schluessel konfiguriert,
        ist der Schreibzugriff fail-safe-closed -> `503`.

        **Wirksamkeit (Reload-Semantik, bewusste Architektenentscheidung):** der
        neue Satz wird beim naechsten kontrollierten Reload/Neustart aktiv — die
        laufende Bewertung nutzt bis dahin die bisherigen Schwellen (kein Live-Swap).

        **RB-01-neutral:** aendert nur Entscheidungs-Parameter, kein Aktor.

        > Nach dem v1.0-Freeze ergaenzt (DTB-63, G2-eigener Endpoint) — Naht-Review
        > durch Architekt. Der eingefrorene G3-`ack`-Endpoint bleibt davon unberuehrt
        > (dessen Auth ist eine eigene M3-Abstimmung mit G3).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThresholdUpdateRequest"
      responses:
        "201":
          description: Neuer Schwellensatz angelegt (wird beim naechsten Reload aktiv).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThresholdSet"
        "401":
          description: Kein/ungueltiger API-Key (NF-07).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: UNAUTHORIZED
                message: "Ungueltiger oder fehlender API-Key."
        "422":
          description: Ungueltige Schwellen-Konfiguration (Body-/Schema-Validierung).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: UNPROCESSABLE_ENTITY
                message: "Ungueltige Schwellen-Konfiguration."
        "503":
          description: Schreibzugriff nicht konfiguriert ODER Persistenz nicht verfuegbar.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: SERVICE_UNAVAILABLE
                message: "G2 momentan nicht lieferfaehig."

  /v1/assessment/current:
    get:
      tags: [Assessment]
      operationId: getCurrentAssessment
      summary: Aktuelle Vereisungsbewertung
      description: |
        Liefert die zuletzt berechnete Bewertung als **Ampel + Roh-Messwerte**
        in einem Response (flach, kein Envelope — E-36).

        **Fail-safe (NF-01):** Sind die zugrunde liegenden Daten veraltet
        (stale) oder fehlt G1, ist dies **kein** Fehler: Response `200` mit
        `is_stale=true` und `risk_level=unknown` (nie GRUEN). `503` nur, wenn G2
        selbst (noch) nicht lieferfaehig ist.

        **RB-01:** rein beratend — keine Freigabe-/Steueraktion.
      responses:
        "200":
          description: Aktuelle Bewertung (ggf. Fail-safe `unknown` + `is_stale=true`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssessmentCurrent"
              examples:
                normal:
                  summary: Normalfall (Risiko gelb)
                  value:
                    risk_level: yellow
                    driving_factor: dew_point
                    explanation: "ΔT ≤ 1,0 °C an der Oberfläche → Feuchte"
                    surface_temp_c: -0.4
                    dew_point_c: -1.1
                    delta_t: 0.7
                    humidity_pct: 96
                    measured_at: "2026-06-22T14:03:05Z"
                    assessed_at: "2026-06-22T14:03:30Z"
                    is_stale: false
                    sensor_status: ok
                failsafe_stale:
                  summary: Fail-safe — veraltete Daten (NF-01)
                  value:
                    risk_level: unknown
                    driving_factor: null
                    explanation: "Letzter Messwert älter als der Stale-Timeout — keine gültige Bewertung."
                    surface_temp_c: null
                    dew_point_c: null
                    delta_t: null
                    humidity_pct: null
                    measured_at: "2026-06-22T13:55:00Z"
                    assessed_at: "2026-06-22T14:03:30Z"
                    is_stale: true
                    sensor_status: ok
                failsafe_fault:
                  summary: Fail-safe — Sensor defekt trotz aktueller Daten (NF-01, nie GRUEN)
                  value:
                    risk_level: unknown
                    driving_factor: null
                    explanation: "Sensor meldet 'fault' — keine vertrauenswürdige Bewertung möglich."
                    surface_temp_c: null
                    dew_point_c: null
                    delta_t: null
                    humidity_pct: null
                    measured_at: "2026-06-22T14:03:05Z"
                    assessed_at: "2026-06-22T14:03:30Z"
                    is_stale: false
                    sensor_status: fault
        "503":
          description: G2 ist nicht lieferfaehig (z. B. noch keine Daten / interner Ausfall). NICHT fuer Stale.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: SERVICE_UNAVAILABLE
                message: "Noch keine Bewertung verfügbar."

  /v1/readings:
    get:
      tags: [Readings]
      operationId: listReadings
      summary: Historie der Messwerte (T1)
      description: |
        Liste eingegangener Messwerte (Ausbaustufe T1). Optional per Zeitraum,
        Sensor und Anzahl eingrenzbar.

        **Hinweis:** `API_FROZEN_v1.md` markiert `/v1/readings` als „reserviert,
        Form folgt mit openapi.yaml". Die hier definierte Form (inkl. der
        G2-internen Felder `received_at`, `dew_point_c`, `source`) wird damit
        **erstmals** festgelegt und ist als T1 noch nachjustierbar.
      parameters:
        - name: from
          in: query
          required: false
          description: Untere Zeitgrenze (ISO-8601, UTC), inklusiv — Filter auf `measured_at`.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          description: Obere Zeitgrenze (ISO-8601, UTC), inklusiv — Filter auf `measured_at`.
          schema:
            type: string
            format: date-time
        - name: sensor_id
          in: query
          required: false
          description: Auf einen Sensor einschraenken.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximale Anzahl Eintraege.
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - name: order
          in: query
          required: false
          description: Sortierung nach `measured_at`. Default `desc` (neueste zuerst).
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: |
            Liste von Messwerten, sortiert nach `order` (Default `desc`).
            **Achtung:** bei mehr Treffern als `limit` wird am jeweils *aelteren*
            Ende abgeschnitten (kein Cursor/Total) — fuer lueckenlose Historie das
            Fenster per `from`/`to` verkleinern oder `limit` erhoehen.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reading"
        "400":
          description: Ungueltige Anfrage (z. B. `from` nach `to`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: BAD_REQUEST
                message: "'from' darf nicht nach 'to' liegen."

  /v1/alarms:
    get:
      tags: [Alarms]
      operationId: listAlarms
      summary: Zustands-Abfrage der Alarme (Resync, kein Entdeckungs-Poll)
      description: |
        Aktuelle Alarme als **Zustands-Abfrage** — fuer den Initial-Load und den
        **Resync nach SSE-Disconnect** (Sicherheits-Backstop, E-37).

        **Nicht** als Entdeckungs-Poll verwenden: Fuer Live-Alarme abonniert G3
        den Stream `GET /v1/alarms/stream`.
      parameters:
        - name: state
          in: query
          required: false
          description: |
            Auf einen Alarm-Zustand filtern. Ohne Angabe alle OFFENEN Alarme
            (`active` + `acknowledged`, ohne `cleared`) — fuer den vollstaendigen
            Resync nach Disconnect (sonst wuerden quittierte, aber noch offene
            Alarme aus der G3-Ansicht verschwinden).
          schema:
            $ref: "#/components/schemas/AlarmState"
        - name: limit
          in: query
          required: false
          description: |
            Maximale Anzahl zurueckgegebener Alarme. Fuer M2/Prototyp optional
            (Alarmzahl bleibt ueberschaubar); fuer M3 empfohlen, damit ein
            Resync nach laengerem Disconnect keine sehr grosse Response erzeugt.
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        "200":
          description: Liste der Alarme.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alarm"
        "400":
          description: Ungueltiger `state`-Filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/alarms/stream:
    get:
      tags: [Alarms]
      operationId: streamAlarms
      summary: Live-Alarm-Stream (Server-Sent Events)
      description: |
        **Server-Sent Events (SSE)** — G3 haelt **eine** Verbindung offen, G2
        **pusht** Alarme live (E-37). Jedes SSE-`data:`-Feld enthaelt **einen
        Alarm** als JSON, Form exakt nach Schema `Alarm` (siehe `components`).
        Kein Polling. Content-Type `text/event-stream`.

        **Frame-Format:** `id:` = Alarm-ID (fuer Reconnect via `Last-Event-ID`),
        `data:` = Alarm-JSON.
        **Heartbeat:** G2 sendet ~alle 15 s eine SSE-Kommentarzeile (`:keep-alive`),
        damit G3 einen still gestorbenen Stream von einem nur ruhigen unterscheidet.
        **Reconnect:** Bei Abriss reconnectet G3 automatisch (Header `Last-Event-ID`)
        und ruft anschliessend **zwingend** `GET /v1/alarms` als Resync-Backstop
        (lueckenlose Zustands-Wiederherstellung, E-37).
      responses:
        "200":
          description: Offener SSE-Stream; jedes Event traegt einen Alarm als JSON.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  SSE-Frames. Beispiel eines Events:
                  `data: {"id":42,"assessment_id":17,"severity":"critical","raised_at":"2026-06-22T14:03:30Z","state":"active"}`
        "503":
          description: G2 ist nicht lieferfaehig (z. B. interner Ausfall beim Verbindungsaufbau). Erlaubt G3, "Stream leer" von "G2 weg" zu unterscheiden.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: SERVICE_UNAVAILABLE
                message: "Alarm-Stream derzeit nicht verfügbar."

  /v1/alarms/{id}/ack:
    post:
      tags: [Alarms]
      operationId: acknowledgeAlarm
      summary: Alarm quittieren (UI-/Audit-Aktion, kein Aktor)
      description: |
        Quittiert einen Alarm. **RB-01:** rein dokumentierend (Audit) — die UI
        kann den Alarm damit beenden, aber dies ist **kein** Bahn-Freigabe-/
        Sperr-Befehl. Setzt den Alarm-Zustand auf `acknowledged`.

        **Double-Ack (NF-09, Audit-Integritaet):** Ist der Alarm bereits
        `acknowledged` oder `cleared`, wird eine erneute Quittierung mit `409`
        abgelehnt (nicht idempotent, kein lautloses Schlucken) — so bleibt jede
        Quittierung ein eindeutiger, nachvollziehbarer Audit-Eintrag.

        **Auth (M2/M3):** Im Prototyp (M2) kein Auth-Header erforderlich.
        Implementierung so aufbauen, dass `Authorization` in M3 ohne Breaking
        Change ergaenzt werden kann (vgl. Versandbegleittext G3).
      parameters:
        - name: id
          in: path
          required: true
          description: ID des zu quittierenden Alarms.
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AckRequest"
            example:
              operator: "tower-ops-01"
              note: "Gesehen, manuelle Sichtkontrolle eingeleitet."
      responses:
        "200":
          description: Quittierung gespeichert (append-only Audit-Eintrag).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Acknowledgement"
        "400":
          description: "Ungueltiger Pfad-Parameter `id` (z. B. `id=0`, verletzt `minimum: 1`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: BAD_REQUEST
                message: "Ungueltige Alarm-ID."
        "404":
          description: Alarm mit dieser ID existiert nicht.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: NOT_FOUND
                message: "Alarm 42 nicht gefunden."
        "409":
          description: Alarm ist bereits quittiert/geschlossen — erneute Quittierung abgelehnt (NF-09).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: ALARM_ALREADY_ACKNOWLEDGED
                message: "Alarm 42 ist bereits im Zustand 'acknowledged'."
        "422":
          description: |
            Ungueltiger Request-Body (Body-Schema-Validierung, z. B. `operator`
            fehlt). Konvention: `400` = Request-/Pfad-/Geschaeftsregel-Fehler (wie
            bei `/v1/readings` und `/v1/alarms`); `422` = Body-Schema-Validierung.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerApiKey:
      type: http
      scheme: bearer
      description: |
        API-Key als Bearer-Token im `Authorization`-Header (NF-07, DTB-63). Nur fuer
        schreibende, G2-eigene Endpoints (derzeit `PUT /v1/thresholds`). Der erwartete
        Schluessel kommt serverseitig aus der Umgebung (`G2_API_KEY`), nie aus dem Code.

  schemas:

    # --- Enums (Spiegel von src/model/enums.py) ---
    RiskLevel:
      type: string
      description: |
        Vereisungs-Risikostufe. `unknown` ist der Fail-safe-Zustand (NF-01):
        bei veralteten/fehlenden Daten nie GRUEN.
      enum: [green, yellow, orange, red, unknown]

    SensorStatus:
      type: string
      description: Sensor-/Lieferstatus (aus G1s `GET /current` `status`).
      enum: [ok, fault]

    AlarmSeverity:
      type: string
      description: |
        Schweregrad eines Alarms. Die **Ableitung** aus der ausloesenden
        Risikostufe (`RiskLevel`) ist eine **G2-interne Regel, NICHT Teil des
        eingefrorenen Wire-Contracts** — G3 konsumiert nur den fertigen
        `severity`-Wert. Aktuelle Abbildung (deckt sich mit `Schwellenwerte.md`,
        „Ausloesung ab ORANGE"): `orange → warning`, `red → critical`;
        `green`/`yellow`/`unknown` loesen keinen Alarm aus. Aenderungen an dieser
        Ableitung bleiben damit G2-intern und sind kein Breaking Change der Naht.
      enum: [warning, critical]

    AlarmState:
      type: string
      description: Lebenszyklus eines Alarms. Quittieren ist reine UI-/Audit-Aktion (RB-01).
      enum: [active, acknowledged, cleared]

    Source:
      type: string
      description: Herkunft eines Messwerts (echter Sensor vs. Simulator).
      enum: [real, sim]

    # --- Health ---
    Health:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    # --- Schwellenwerte (G2 -> G3), DTB-62 ---
    Thresholds:
      type: object
      description: |
        Aktuell konfigurierte Vereisungs-Schwellenwerte (Spiegel von
        config/thresholds.json via Loader DTB-15). Werte sind parametrierbar
        (NF-05); aktuell DUMMY (G1-Finalwerte folgen).
      required: [vereisung, prognose, datenqualitaet, plausibilitaet]
      properties:
        vereisung:
          type: object
          required:
            [t_s_gefrierpunkt_c, t_s_gelb_auffang_c, delta_t_kondensation_k, delta_t_feucht_k]
          properties:
            t_s_gefrierpunkt_c:
              type: number
              description: Oberflaechentemp-Gefrierpunkt (°C).
            t_s_gelb_auffang_c:
              type: number
              description: Obere GELB-Auffang-Grenze fuer T_s (°C).
            delta_t_kondensation_k:
              type: number
              description: ΔT-Schwelle Kondensation (K).
            delta_t_feucht_k:
              type: number
              description: ΔT-Schwelle "Feuchte vorhanden" (K).
        prognose:
          type: object
          required: [t_s_grenz_c]
          properties:
            t_s_grenz_c:
              type: number
              description: T_s-Grenze fuer die GELB-Prognoseschwelle (°C).
        datenqualitaet:
          type: object
          required:
            [stale_timeout_s, max_temp_jump_c_per_min, flatline_timeout_min, flatline_epsilon_c, max_clock_skew_s, min_plausible_dew_point_c]
          properties:
            stale_timeout_s:
              type: number
              description: Timeout nach dem ein Messwert als veraltet gilt (s).
            max_temp_jump_c_per_min:
              type: number
              description: Maximal zulaessiger Temperatursprung pro Minute (°C/min).
            flatline_timeout_min:
              type: number
              description: Timeout fuer erkannte Flatline (min).
            flatline_epsilon_c:
              type: number
              description: Toleranz fuer Flatline-Erkennung (°C).
            max_clock_skew_s:
              type: number
              description: Maximal zulaessige Uhrzeitabweichung (s).
            min_plausible_dew_point_c:
              type: number
              description: Minimal plausibler Taupunkt (°C).
        plausibilitaet:
          type: object
          required:
            [min_temp_c, max_temp_c, min_humidity_pct, max_humidity_pct, min_pressure_hpa, max_pressure_hpa]
          properties:
            min_temp_c:
              type: number
              description: Minimale plausible Temperatur (°C).
            max_temp_c:
              type: number
              description: Maximale plausible Temperatur (°C).
            min_humidity_pct:
              type: number
              description: Minimale plausible Luftfeuchte (%).
            max_humidity_pct:
              type: number
              description: Maximale plausible Luftfeuchte (%).
            min_pressure_hpa:
              type: number
              description: Minimaler plausibler Luftdruck (hPa).
            max_pressure_hpa:
              type: number
              description: Maximaler plausibler Luftdruck (hPa).

    # --- Schwellen-Schreibweg (G2-eigen, Auth), DTB-63 ---
    ThresholdUpdateRequest:
      type: object
      description: |
        Request-Body fuer PUT /v1/thresholds. `thresholds` ist die vollstaendige
        Schwellen-Struktur (wie `GET /v1/thresholds` sie liefert); sie wird
        serverseitig ueber den kanonischen Loader validiert (ungueltig -> 422).
        `changed_by` ist der selbstdeklarierte Operator fuer den Audit-Trail
        (NF-09/K6). `name` ist ein Label fuer den versionierten Satz.
      required: [changed_by, thresholds]
      properties:
        changed_by:
          type: string
          minLength: 1
          maxLength: 128
          description: Kennung der aendernden Person (Audit-Anker, NF-09).
        name:
          type: string
          minLength: 1
          maxLength: 128
          default: "manuelle Aktualisierung"
          description: Label fuer den versionierten Schwellensatz.
        thresholds:
          $ref: "#/components/schemas/Thresholds"

    ThresholdSet:
      type: object
      description: |
        Angelegter, versionierter Schwellensatz (Antwort auf PUT /v1/thresholds).
        Append-only (Supersession per `valid_from`, DTB-54).
      required: [id, name, params, valid_from, changed_by]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
          maxLength: 128
        params:
          $ref: "#/components/schemas/Thresholds"
        valid_from:
          type: string
          format: date-time
          description: Gueltig-ab-Zeitpunkt (UTC); hoechster Wert = aktiver Satz.
        changed_by:
          type: string
          maxLength: 128

    # --- Aktuelle Bewertung (G2 -> G3), flach (E-36) ---
    AssessmentCurrent:
      type: object
      description: |
        Aktuelle Vereisungsbewertung. Felder gemaess `Assessment`-Schema
        (src/model/schemas.py): `assessed_at` entspricht dort dem Feld `ts`;
        `measured_at` stammt aus dem verknuepften `Reading` (G1-Snapshot, nicht
        aus `Assessment`). Naht-Felder `is_stale`/`sensor_status` ergaenzen die
        Naht-Sicht. Alle Zeitstempel in UTC (ISO-8601).

        **Fail-safe-Invarianten (NF-01) — verbindlich, von der `assessment/`-Logik
        garantiert (OpenAPI 3.0.3 kann felduebergreifende Regeln nicht hart
        erzwingen; Durchsetzung + Tests liegen im kritischen Pfad):**
        - `risk_level=green` ist NUR zulaessig, wenn `is_stale=false` UND
          `sensor_status=ok`. Bei `is_stale=true` oder `sensor_status=fault`
          gilt `risk_level=unknown` (nie GRUEN).
        - `measured_at` ist auf einer 200-Antwort **immer** gesetzt (auch bei
          `risk_level=unknown`); der Fall „gar keine Daten" wird mit **HTTP 503**
          signalisiert, nicht mit `null`.
        - Bei `risk_level != unknown` sind `surface_temp_c`, `dew_point_c`,
          `delta_t` und `humidity_pct` nicht-null (eine echte
          Bewertung hat immer Messwerte). Genullte Messwerte treten **nur** bei
          `risk_level=unknown` auf — ausgeloest durch `is_stale=true` (veraltet)
          **oder** `sensor_status=fault` (Sensor defekt). `measured_at` kann dabei
          im Fault-Fall mit frischen Daten gesetzt sein (Zeitstempel bekannt, Werte
          aber nicht vertrauenswuerdig); bei reinem Stale traegt es den letzten,
          alten Zeitstempel.
      required: [risk_level, assessed_at, is_stale, sensor_status, measured_at]
      properties:
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        driving_factor:
          type: string
          nullable: true
          maxLength: 64  # = VARCHAR(64) in migrations/schema.sql (assessment.driving_factor)
          description: Hauptfaktor der Bewertung (z. B. `dew_point`, `surface_temp`).
        explanation:
          type: string
          nullable: true
          maxLength: 512  # = VARCHAR(512) in migrations/schema.sql (assessment.explanation)
          description: Menschenlesbare Begruendung der Stufe.
        surface_temp_c:
          type: number
          nullable: true
          description: Oberflaechentemperatur T_s (°C).
        dew_point_c:
          type: number
          nullable: true
          description: Taupunkt (°C), von G2 berechnet (Magnus).
        delta_t:
          type: number
          nullable: true
          description: ΔT = surface_temp_c − dew_point_c (°C).
        humidity_pct:
          type: number
          nullable: true
          description: Luftfeuchte (%).
        measured_at:
          type: string
          format: date-time
          description: |
            G1-Messzeitpunkt des zugrundeliegenden Readings (UTC). Auf einer 200-Antwort
            immer gesetzt (bei `is_stale=true` = letzter bekannter Zeitstempel). Der Fall
            „gar keine Daten vorhanden" wird mit HTTP 503 signalisiert, nicht mit `null`.
        assessed_at:
          type: string
          format: date-time
          description: G2-Bewertungszeitpunkt (UTC).
        is_stale:
          type: boolean
          description: "`true` = Daten ueberaltert; zusammen mit `risk_level=unknown` = Fail-safe griff (NF-01)."
        sensor_status:
          $ref: "#/components/schemas/SensorStatus"

    # --- Messwert (Historie) ---
    Reading:
      type: object
      description: Einzelner Messwert-Snapshot. Sensor-Felder von G1, Rest von G2 berechnet/gesetzt.
      required: [id, sensor_id, measured_at, surface_temp_c, air_temp_c, humidity_pct, status, received_at, source]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        sensor_id:
          type: string
          maxLength: 64  # = VARCHAR(64) in migrations/schema.sql (reading.sensor_id)
          example: anr-rwy-01
        measured_at:
          type: string
          format: date-time
          description: Mess-Zeitstempel (UTC), gemeinsam fuer alle Werte.
        surface_temp_c:
          type: number
          description: Oberflaechentemperatur T_s (°C).
        air_temp_c:
          type: number
          description: Lufttemperatur T_a (°C).
        humidity_pct:
          type: number
          description: Luftfeuchte (%).
        pressure_hpa:
          type: number
          nullable: true
          description: Luftdruck (hPa), optional.
        status:
          $ref: "#/components/schemas/SensorStatus"
        received_at:
          type: string
          format: date-time
          description: Poll-Zeitpunkt von G2 (UTC).
        dew_point_c:
          type: number
          nullable: true
          description: Taupunkt (°C), von G2 berechnet.
        source:
          $ref: "#/components/schemas/Source"

    # --- Alarm ---
    Alarm:
      type: object
      description: Aus einer Bewertung erzeugter Alarm (kein Aktor, RB-01).
      required: [id, assessment_id, severity, raised_at, state]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        assessment_id:
          type: integer
          format: int64
        severity:
          $ref: "#/components/schemas/AlarmSeverity"
        raised_at:
          type: string
          format: date-time
          description: Ausloesezeitpunkt (UTC).
        state:
          $ref: "#/components/schemas/AlarmState"

    # --- Quittierung ---
    AckRequest:
      type: object
      description: Request-Body fuer die Quittierung eines Alarms.
      required: [operator]
      properties:
        operator:
          type: string
          minLength: 1  # leer waere kein gueltiger Audit-Eintrag (NF-09)
          maxLength: 128  # = VARCHAR(128) in migrations/schema.sql (acknowledgement.operator)
          description: Kennung der quittierenden Person (Audit).
        note:
          type: string
          nullable: true
          maxLength: 512  # = VARCHAR(512) in migrations/schema.sql (acknowledgement.note)
          description: Optionale Notiz.

    Acknowledgement:
      type: object
      description: Gespeicherte Quittierung (append-only, NF-09).
      required: [id, alarm_id, operator, ts]
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        alarm_id:
          type: integer
          format: int64
        operator:
          type: string
        note:
          type: string
          nullable: true
        ts:
          type: string
          format: date-time
          description: Zeitpunkt der Quittierung (UTC).

    # --- Fehlerformat ---
    Error:
      type: object
      description: Maschinenlesbarer Fehler (Code + Meldung). Keine internen Details/Secrets.
      required: [code, message]
      properties:
        code:
          type: string
          description: Maschinenlesbarer Fehlercode (z. B. BAD_REQUEST, NOT_FOUND, SERVICE_UNAVAILABLE).
        message:
          type: string
          description: Menschenlesbare Fehlermeldung.
