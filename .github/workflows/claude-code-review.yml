name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          use_sticky_comment: true
          prompt: |
            Review den Diff dieses Pull Requests. Antworte auf **Deutsch**.
            Achte besonders auf:
            - Bugs / Korrektheit
            - Sicherheitsprobleme (z. B. hardcodierte Secrets, fehlende Validierung)
            - fehlende Fehlerbehandlung
            - Code-Qualität & Lesbarkeit
            Halte dich an die Projektkonventionen in `CLAUDE.md`.
            Fasse dich knapp: liste nur echte Findings mit Schweregrad
            (CRITICAL / HIGH / MEDIUM / LOW) und Datei/Zeile. Wenn nichts Relevantes
            auffällt, sag das kurz.
